<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Волейбол-Квест</title>
<style>
  html, body {
    margin: 0; height: 100%; height: 100dvh;
    background: radial-gradient(120% 120% at 50% 0%, #2a2d4a 0%, #14131f 60%, #0b0a12 100%);
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; overflow: hidden; touch-action: none;
  }
  h1 { color: #eef; margin: 8px 0 2px; font-size: 20px; letter-spacing: .5px; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
  p.hint { color: #9aa0c0; margin: 0 0 8px; font-size: 13px; text-align: center; }
  #wrap { position: relative; line-height: 0; }
  canvas {
    background: #0d0a18; border: 2px solid #2b2c46; border-radius: 14px; display: block;
    width: min(96vw, 168vh, 960px); aspect-ratio: 960 / 540; height: auto; touch-action: none;
    box-shadow: 0 18px 50px rgba(0,0,0,.55);
  }
  /* на узких/низких экранах телефона убираем лишнее, чтобы игра была крупнее */
  @media (max-height: 540px) { h1, p.hint { display: none; } }
  #rotate { display: none; }
  @media (orientation: portrait) and (pointer: coarse) {
    h1, p.hint { display: none; }
    #rotate { display: flex; position: fixed; inset: 0; z-index: 50;
      background: radial-gradient(120% 120% at 50% 0%, #2a2d4a 0%, #14131f 70%);
      color: #eef; align-items: center; justify-content: center; text-align: center;
      font-size: 22px; line-height: 1.5; padding: 24px; }
  }
</style>
</head>
<body>
  <h1>🏐 Волейбол-Квест</h1>
  <p class="hint">← → ходить · Shift бег · Space прыжок (двойной) · F / J бросок · R баскетбол-ульта · Esc пауза · M звук</p>
  <div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
  <div id="rotate">📱↺<br>Поверни телефон горизонтально,<br>чтобы играть</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND_Y = 472;
const GRAVITY = 0.8;

// ---- адаптация под телефон: вписываем игру в реально видимую область (учёт шторки/панелей браузера) ----
const _h1 = document.querySelector('h1'), _hint = document.querySelector('p.hint');
function fitGame() {
  const vv = window.visualViewport;
  const vw = vv ? vv.width : window.innerWidth;
  const vh = vv ? vv.height : window.innerHeight;
  document.body.style.height = vh + 'px';
  const reserved = (_h1 && _h1.offsetParent !== null ? _h1.offsetHeight : 0) + (_hint && _hint.offsetParent !== null ? _hint.offsetHeight : 0) + 12;
  const availH = Math.max(140, vh - reserved), availW = vw - 6, aspect = 960 / 540;
  const w = Math.min(availW, availH * aspect, 960);
  canvas.style.width = w + 'px';
  canvas.style.height = (w / aspect) + 'px';
}
window.addEventListener('resize', () => setTimeout(fitGame, 60));
window.addEventListener('orientationchange', () => setTimeout(fitGame, 250));
if (window.visualViewport) { window.visualViewport.addEventListener('resize', fitGame); window.visualViewport.addEventListener('scroll', fitGame); }
setTimeout(fitGame, 0);

/* ===================== ПЕРСОНАЖИ (ФОТО) ===================== */
const characters = [
  { name: 'Лена', srcs: ['assets/player.png', 'assets/player.jpg', 'assets/player.jpeg'], img: new Image(), ready: false, idx: 0, sweater: '#2e2e30' },
  { name: 'Эрн', srcs: ['assets/player2.png', 'assets/player2.jpg', 'assets/player2.jpeg'], img: new Image(), ready: false, idx: 0, sweater: '#7a2e3a' },
];
characters.forEach(c => { c.img.onload = () => { c.ready = true; }; c.img.onerror = () => { c.idx++; if (c.idx < c.srcs.length) c.img.src = c.srcs[c.idx]; }; c.img.src = c.srcs[0]; });
let selIdx = 0;

/* ===================== БИОМЫ ===================== */
const BIOMES = [
  { key: 'forest', name: 'Лес', sky: ['#7ec6f7', '#bfe9ff', '#e8f7ff'], hill: '#6fb35e', hill2: '#4f9344', hill3: '#9cc7d8',
    groundTop: '#67b743', groundTopDark: '#4a8f2e', groundBody: '#7a5733', groundBodyDark: '#3f2c19',
    decor: 'trees', weather: 'leaves', dark: 0, len: 3400, event: 'boulder', court: true, props: ['log', 'rock', 'net'],
    monsters: ['slime','frog','slime','frog'] },

  { key: 'city', name: 'Город', sky: ['#8fb4dd', '#cdddee', '#eef4fa'], hill: '#7e8aa0', hill2: '#5f6a82', hill3: '#9aa6bd',
    groundTop: '#5e636d', groundTopDark: '#43474f', groundBody: '#3a3d44', groundBodyDark: '#222429',
    decor: 'buildings', weather: 'none', dark: 0, len: 3700, cars: true, houses: true, interior: true, props: ['brokenCar','crate','barrier','net'],
    monsters: ['drone','slime','drone','slime'] },

  { key: 'cave', name: 'Пещера', sky: ['#2a2148', '#191230', '#0c0818'], hill: '#241f3c', hill2: '#191428', hill3: '#2e2750',
    groundTop: '#494560', groundTopDark: '#322f46', groundBody: '#2a2740', groundBodyDark: '#161426',
    decor: 'crystals', weather: 'motes', dark: 0.3, len: 3500, event: 'rockfall', props: ['rock','rock'],
    monsters: ['bat','spider','bat','spider','bat'] },

  { key: 'snow', name: 'Снежные горы', sky: ['#a9d6f5', '#d6ecfb', '#f3fbff'], hill: '#c2d6ea', hill2: '#9fbad6', hill3: '#dbe9f5',
    groundTop: '#ffffff', groundTopDark: '#cfe0ee', groundBody: '#a6b9c9', groundBodyDark: '#76889a',
    decor: 'pines', weather: 'snow', dark: 0, len: 3500, event: 'avalanche', interior: true, props: ['iceblock','rock','net'],
    monsters: ['iceslime','snowman','iceslime','snowman'] },

  { key: 'bridge', name: 'Закатный мост', sky: ['#3a2a66', '#b8538a', '#ffb27a'], hill: '#5a3f7e', hill2: '#3e2c5e', hill3: '#7a5594',
    groundTop: '#7a5b3a', groundTopDark: '#4f3a24', groundBody: '#46342a', groundBodyDark: '#281d16',
    decor: 'bridge', weather: 'dusk', dark: 0.12, len: 3500, event: 'train', props: ['crate','barrier','brokenCar','net'],
    monsters: ['ghost','bat','ghost','bat'] },

  { key: 'lair', name: 'Логово Босса', sky: ['#4a0f22', '#2a0a16', '#120410'], hill: '#3a1322', hill2: '#260a16', hill3: '#4a162a',
    groundTop: '#5a2030', groundTopDark: '#391420', groundBody: '#2a1019', groundBodyDark: '#15080d',
    decor: 'crystals', weather: 'embers', dark: 0.2, len: 2000, monsters: ['boss'] },
];

const PROP_DIM = { brokenCar: { w: 118, h: 56 }, crate: { w: 46, h: 46 }, rock: { w: 66, h: 50 }, log: { w: 96, h: 38 }, barrier: { w: 64, h: 54 }, iceblock: { w: 62, h: 58 },
  table: { w: 92, h: 46 }, stove: { w: 62, h: 52, dmg: 14 }, fridge: { w: 54, h: 98 }, chair: { w: 34, h: 46 }, net: { w: 80, h: 96 } };
const EVENT_ALERT = { train: '🚂 ПОЕЗД! Запрыгни на платформу!', boulder: '🪨 ВАЛУН! Перепрыгни его!', avalanche: '🏔️ ЛАВИНА! Заберись повыше!', rockfall: '⚠️ КАМНЕПАД! Уворачивайся!' };

/* ===================== ИГРОК ===================== */
const PW = 52, PH = 84, SPRITE = 98;
const MOVE_ACC = 1.0, MOVE_MAX = 6.0, SPRINT_MAX = 9.2, FRICTION = 0.8;
const JUMP_V = -15.2, JUMP2_V = -13.6;
const MAX_AMMO = 3, ATK_CD = 11, RELOAD = 84;
const THROW_SPEED = 13, THROW_DMG = 25;
const ULT_FULL = 780, ULT_DMG = 95, ULT_GAIN = 70;   // ульта героя: мощный баскетбольный мяч (копится за попадания)

const player = {
  x: 90, y: GROUND_Y - PH, w: PW, h: PH, vx: 0, vy: 0, onGround: false, facing: 1, jumps: 0, sprint: false,
  hp: 100, maxHp: 100, inv: 0, atkCd: 0, ammo: MAX_AMMO, reload: 0, ult: 0,
};

let biomeIdx = 0, level = null;
let projectiles = [], eprojectiles = [], particles = [], pickups = [];
let camera = { x: 0, shake: 0 };
let score = 0, best = 0, newRecord = false;
try { best = parseInt(localStorage.getItem('vq_best') || '0', 10) || 0; } catch (e) {}
function saveBest() { try { localStorage.setItem('vq_best', String(best)); } catch (e) {} }
let state = 'select';
let bannerT = 0, hintT = 0, alertT = 0, alertText = '';
let frame = 0;

/* ===================== ЗВУК ===================== */
let actx = null, muted = false;
function unlockAudio() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
function beep(freq, dur, type, vol, slideTo) {
  if (muted || !actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square'; o.frequency.value = freq; g.gain.value = vol || 0.05; o.connect(g); g.connect(actx.destination);
  const t = actx.currentTime; if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  o.start(t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.stop(t + dur);
}
const sfx = {
  jump: () => beep(440, .12, 'square', .04, 700), jump2: () => beep(620, .12, 'square', .04, 920),
  throw: () => beep(360, .09, 'triangle', .045, 200), reload: () => beep(300, .12, 'sine', .04, 520),
  hit: () => beep(680, .06, 'square', .05), hurt: () => beep(180, .22, 'sawtooth', .06, 90),
  kill: () => beep(240, .18, 'square', .05, 520), portal: () => { beep(523, .12, 'sine', .05); setTimeout(() => beep(784, .18, 'sine', .05), 110); },
  pick: () => beep(880, .1, 'sine', .05, 1200), horn: () => { beep(160, .5, 'sawtooth', .06); setTimeout(() => beep(130, .5, 'sawtooth', .06), 120); },
  ult: () => beep(90, .6, 'sawtooth', .07, 220), tele: () => beep(900, .18, 'sine', .05, 200),
  win: () => [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.22,'sine',.06),i*140)),
  lose: () => [330,247,165].forEach((f,i)=>setTimeout(()=>beep(f,.3,'sawtooth',.06),i*160)),
  ultBall: () => { beep(220,.25,'sawtooth',.06,560); setTimeout(()=>beep(520,.2,'square',.05,920),120); },
  drive: () => { beep(110, .16, 'sawtooth', .13, 230); setTimeout(() => beep(150, .45, 'sawtooth', .12, 70), 110); },   // газует
  carScream: () => {   // смешной человеческий вопль "АААА" (синтез гласной через форманты)
    if (muted || !actx) return;
    const t = actx.currentTime;
    const src = actx.createOscillator(); src.type = 'sawtooth';
    src.frequency.setValueAtTime(205, t);
    src.frequency.linearRampToValueAtTime(300, t + 0.12);
    src.frequency.setValueAtTime(285, t + 0.5);
    src.frequency.exponentialRampToValueAtTime(150, t + 1.05);   // голос съезжает вниз — проносится мимо
    const vib = actx.createOscillator(), vibg = actx.createGain(); vib.type = 'sine'; vib.frequency.value = 11; vibg.gain.value = 15; vib.connect(vibg); vibg.connect(src.frequency);   // дрожание голоса
    const out = actx.createGain(); out.gain.setValueAtTime(0, t); out.gain.linearRampToValueAtTime(0.14, t + 0.05); out.gain.setValueAtTime(0.14, t + 0.78); out.gain.exponentialRampToValueAtTime(0.0001, t + 1.1); out.connect(actx.destination);
    for (const [f, q, a] of [[800, 9, 1], [1150, 11, 0.7], [2700, 12, 0.35]]) { const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = f; bp.Q.value = q; const g = actx.createGain(); g.gain.value = a; src.connect(bp); bp.connect(g); g.connect(out); }
    src.start(t); vib.start(t); src.stop(t + 1.12); vib.stop(t + 1.12);
  },
};

// ---- фоновая музыка по биомам (спокойная → зловещая ближе к боссу) ----
const MUSIC = {
  forest: { step: 460, dur: .55, wave: 'triangle', vol: .026, mel: [523,0,659,0, 784,0,659,0, 587,0,494,0, 523,0,0,0], bass: [131,0,98,0] },
  city:   { step: 430, dur: .5,  wave: 'triangle', vol: .024, mel: [440,0,523,0, 659,0,523,0, 587,0,494,0, 440,0,0,0], bass: [110,0,131,0] },
  cave:   { step: 500, dur: .62, wave: 'sine',     vol: .032, mel: [392,0,0,466, 0,440,0,0, 349,0,0,392, 0,0,0,0], bass: [98,0,104,0] },
  snow:   { step: 480, dur: .58, wave: 'sine',     vol: .028, mel: [659,0,784,0, 880,0,784,0, 698,0,587,0, 659,0,0,0], bass: [131,0,117,0] },
  bridge: { step: 430, dur: .5,  wave: 'triangle', vol: .03,  mel: [440,0,523,0, 466,0,392,0, 349,0,392,0, 330,0,0,0], bass: [110,0,98,0] },
  lair:   { step: 350, dur: .42, wave: 'sawtooth', vol: .038, mel: [330,0,311,0, 294,0,277,0, 233,0,277,0, 311,0,0,0], bass: [73,73,78,69] },
};
let musicTimer = null, musicStep = 0, musicCfg = null;
function mnote(freq, dur, wave, vol) {
  if (muted || !actx || !freq) return;
  const o = actx.createOscillator(), g = actx.createGain(); o.type = wave; o.frequency.value = freq;
  const t = actx.currentTime; g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(vol, t + .03); g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + dur + .02);
}
function musicTick() {
  musicStep++;
  if (muted || !actx || !musicCfg || state !== 'playing') return;   // на паузе/в меню музыка молчит
  const c = musicCfg, i = musicStep % c.mel.length;
  mnote(c.mel[i], c.dur, c.wave, c.vol);
  if (c.bass && i % 4 === 0) mnote(c.bass[(i / 4) % c.bass.length], c.step / 1000 * 3.6, 'triangle', c.vol * 0.7);
}
function startMusic(key) { stopMusic(); musicCfg = MUSIC[key] || null; musicStep = 0; if (musicCfg) musicTimer = setInterval(musicTick, musicCfg.step); }
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

/* ===================== ВВОД ===================== */
const input = { left: false, right: false, attack: false };
let kbLeft = false, kbRight = false, kbAtk = false, kbSprint = false, wantJump = false;
let touchMode = (typeof window.matchMedia === 'function' && window.matchMedia('(pointer: coarse)').matches);
const activeTouches = new Map();
function refreshFlags() {
  let tl = false, tr = false, ta = false;
  for (const r of activeTouches.values()) { if (r === 'left') tl = true; if (r === 'right') tr = true; if (r === 'attack') ta = true; }
  input.left = kbLeft || tl; input.right = kbRight || tr; input.attack = kbAtk || ta; player.sprint = kbSprint;
}
window.addEventListener('keydown', e => {
  unlockAudio();
  if (e.code === 'KeyM') { muted = !muted; return; }
  if (e.code === 'Escape') { if (state === 'playing') state = 'paused'; else if (state === 'paused') state = 'playing'; return; }
  if (state === 'paused') { if (e.code === 'KeyR') startGame(); else if (e.code === 'KeyL') state = 'select'; return; }
  if (state === 'select') {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); selIdx = (selIdx + characters.length - 1) % characters.length; return; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); selIdx = (selIdx + 1) % characters.length; return; }
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); startGame(); return; }
    return;
  }
  if (state === 'over' || state === 'win') { if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); state = 'select'; } return; }
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') kbLeft = true;
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') kbRight = true;
  else if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); wantJump = true; }
  else if (e.code === 'KeyF' || e.code === 'KeyJ') kbAtk = true;
  else if (e.code === 'KeyR' || e.code === 'KeyQ') tryUlt();
  else if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') kbSprint = true;
  refreshFlags();
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') kbLeft = false;
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') kbRight = false;
  else if (e.code === 'KeyF' || e.code === 'KeyJ') kbAtk = false;
  else if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') kbSprint = false;
  refreshFlags();
});
function canvasXY(cx, cy) { const r = canvas.getBoundingClientRect(); return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) }; }
function buttonRects() {
  const s = 96, m = 14, b = H - s - m;
  return { left: { x: m, y: b, w: s, h: s, label: '◀' }, right: { x: m + s + 12, y: b, w: s, h: s, label: '▶' },
    attack: { x: W - m - s, y: b, w: s, h: s, label: '🏐' }, jump: { x: W - m - s * 2 - 12, y: b, w: s, h: s, label: '⤒' },
    ult: { x: W - m - s, y: b - 70, w: s, h: 62, label: '🏀' } };
}
function regionAt(x, y) { const r = buttonRects(); for (const k in r) { const b = r[k]; if (x >= b.x - 6 && x <= b.x + b.w + 6 && y >= b.y - 6 && y <= b.y + b.h + 6) return k; } return null; }
function pauseButtons() { const bw = 300, bh = 48, cx = W / 2 - bw / 2, y0 = H / 2 - 34; return { resume: { x: cx, y: y0, w: bw, h: bh, label: '▶  Продолжить (Esc)' }, restart: { x: cx, y: y0 + 58, w: bw, h: bh, label: '↻  Начать сначала (R)' }, lobby: { x: cx, y: y0 + 116, w: bw, h: bh, label: '⌂  Выйти в лобби (L)' } }; }
function pausePointer(x, y) { const b = pauseButtons(); const hit = k => x > b[k].x && x < b[k].x + b[k].w && y > b[k].y && y < b[k].y + b[k].h; if (hit('resume')) state = 'playing'; else if (hit('restart')) startGame(); else if (hit('lobby')) state = 'select'; }
function menuPointer(x, y) {
  if (state === 'select') { const slots = selectSlots(); for (let i = 0; i < slots.length; i++) { const s = slots[i]; if (x > s.bx - 18 && x < s.bx + s.size + 18) { selIdx = i; break; } } startGame(); }
  else if (state === 'over' || state === 'win') state = 'select';
}
canvas.addEventListener('mousedown', e => {
  e.preventDefault(); unlockAudio(); const p = canvasXY(e.clientX, e.clientY);
  if (state === 'paused') { pausePointer(p.x, p.y); return; }
  if (state === 'playing') { const reg = touchMode ? regionAt(p.x, p.y) : null; if (reg) handleTouchStart('m', reg); else tryThrow(); } else menuPointer(p.x, p.y);
});
function handleTouchStart(id, region) { if (region === 'jump') wantJump = true; else if (region === 'ult') tryUlt(); else { activeTouches.set(id, region); refreshFlags(); } }
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); unlockAudio(); touchMode = true;
  for (const t of e.changedTouches) { const p = canvasXY(t.clientX, t.clientY); if (state === 'paused') { pausePointer(p.x, p.y); continue; } if (state !== 'playing') { menuPointer(p.x, p.y); continue; } const reg = regionAt(p.x, p.y); if (reg) handleTouchStart(t.identifier, reg); else { activeTouches.set(t.identifier, 'free'); tryThrow(); } }
  refreshFlags();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) { if (!activeTouches.has(t.identifier)) continue; const p = canvasXY(t.clientX, t.clientY); const reg = regionAt(p.x, p.y); activeTouches.set(t.identifier, reg && reg !== 'jump' ? reg : 'free'); }
  refreshFlags();
}, { passive: false });
function endTouch(e) { e.preventDefault(); for (const t of e.changedTouches) activeTouches.delete(t.identifier); refreshFlags(); }
canvas.addEventListener('touchend', endTouch, { passive: false });
canvas.addEventListener('touchcancel', endTouch, { passive: false });

/* ===================== МОНСТРЫ ===================== */
const M_DEF = {
  slime: { w: 48, h: 34, hp: 34, dmg: 8, pts: 50, move: 'hop', speed: 2.4, hop: 8 },
  frog: { w: 56, h: 42, hp: 54, dmg: 10, pts: 80, move: 'hop', speed: 3.4, hop: 11 },
  spider: { w: 54, h: 32, hp: 46, dmg: 12, pts: 90, move: 'crawl', speed: 2.9 },
  bat: { w: 46, h: 30, hp: 26, dmg: 8, pts: 70, move: 'fly', speed: 2.4 },
  iceslime: { w: 50, h: 36, hp: 46, dmg: 9, pts: 75, move: 'hop', speed: 2.7, hop: 9 },
  snowman: { w: 52, h: 66, hp: 70, dmg: 11, pts: 120, move: 'ranged', speed: 0.8 },
  drone: { w: 50, h: 36, hp: 34, dmg: 9, pts: 100, move: 'drone', speed: 2.7 },
  ghost: { w: 48, h: 56, hp: 40, dmg: 11, pts: 110, move: 'ghost', speed: 1.9 },
  boss: { w: 160, h: 160, hp: 1300, dmg: 13, pts: 2600, move: 'boss', speed: 1.1 },
};
function makeMonster(type, x) {

function buildLevel(i) {

  if (b.decor === 'trees' || b.decor === 'pines') for (let x = 120; x < len - 100; x += 150 + r() * 160) decor.trees.push({ x, s: 0.8 + r() * 0.7, kind: b.decor });

  if (b.houses) for (let x = 600; x < len - 500; x += 760 + r() * 360) { const hw = 150 + r() * 50, hh = 150 + r() * 50; houses.push({ x, w: hw, h: hh, hue: 20 + r() * 40, used: false, door: { x: x + hw / 2 - 22, y: GROUND_Y - 64, w: 44, h: 64 } }); }
  if (b.cars) { const cc = ['#d23b3b','#3b6dd2','#e0a020','#2aa75a','#8a3bd2','#cc5599']; for (let k = 0; k < 4; k++) { const fast = k === 0; hazards.push({ kind: 'car', x: 760 + k * (len / 5), y: GROUND_Y - 44, w: fast ? 104 : 92, h: 44, vx: -((fast ? 10.5 : 7.5) + r() * 2.0), dmg: 14, color: fast ? '#ff4dc4' : cc[k % cc.length], fast, seen: false }); } }
  if (b.props) { let px = 720; while (px < len - 620) { const kind = b.props[Math.floor(r() * b.props.length)]; const d = PROP_DIM[kind]; if (!inInt(px)) props.push({ kind, x: px, y: GROUND_Y - d.h, w: d.w, h: d.h, seed: r() }); px += 520 + r() * 520; } }
  // мебель внутри зданий: стол (перепрыгнуть), плита (нельзя вставать — жжётся), холодильник, стул
  for (const it of interiors) { const fl = ['table', 'stove', 'fridge', 'chair', 'table', 'stove']; let fx = it.x + 90, fi = Math.floor(r() * 5); while (fx < it.x + it.w - 100) { const kind = fl[fi % fl.length], d = PROP_DIM[kind]; props.push({ kind, x: fx, y: GROUND_Y - d.h, w: d.w, h: d.h, dmg: d.dmg || 0, seed: r() }); fx += 150 + r() * 60; fi++; }
    // дом-убежище: 2 сердечка внутри

  if (b.props && b.props.indexOf('net') >= 0) { const d = PROP_DIM.net; props.push({ kind: 'net', x: Math.floor(len * 0.3), y: GROUND_Y - d.h, w: d.w, h: d.h }); }   // гарантированная волейбольная сетка

  if (b.key !== 'lair') {
    let px = 480;
    while (px < len - 460) { const py = GROUND_Y - (98 + r() * 86), pw = 96 + r() * 64; if (!inInt(px)) { platforms.push({ x: px, y: py, w: pw }); if (r() < 0.6) pickups.push({ x: px + pw / 2, y: py - 34, type: 'heart', bob: r() * 6.28, taken: false }); } px += 320 + r() * 320; }

/* ===================== СТАРТ / ПЕРЕХОДЫ ===================== */
function startGame() { biomeIdx = 0; player.hp = player.maxHp; player.ult = 0; score = 0; enterBiome(0); state = 'playing'; }
function enterBiome(i) {
  biomeIdx = i; projectiles = []; eprojectiles = []; particles = []; pickups = []; level = buildLevel(i);
  player.x = 90; player.y = GROUND_Y - PH; player.vx = 0; player.vy = 0; player.facing = 1; player.inv = 0; player.atkCd = 0; player.ammo = MAX_AMMO; player.reload = 0; player.jumps = 0;
  camera.x = 0; camera.shake = 0; bannerT = 150; hintT = i === 0 ? 360 : 0; alertT = 0;

}
function nextBiome() { if (biomeIdx + 1 < BIOMES.length) { player.hp = Math.min(player.maxHp, player.hp + 25); sfx.portal(); enterBiome(biomeIdx + 1); } }
function gameOver() { state = 'over'; newRecord = Math.floor(score) > best; best = Math.max(best, Math.floor(score)); saveBest(); sfx.lose(); }

/* ===================== БОЙ ===================== */
function tryThrow() {
  if (state !== 'playing' || player.atkCd > 0 || player.reload > 0 || player.ammo <= 0) return;
  player.ammo--; player.atkCd = ATK_CD;
  for (const dir of [1, -1]) projectiles.push({ x: player.x + player.w / 2 + dir * 20, y: player.y + 48, vx: dir * THROW_SPEED, vy: -1.0, r: 13, rot: 0, life: 120 });   // два мяча в обе стороны = один бросок

}
function tryUlt() {
  if (state !== 'playing' || player.ult < ULT_FULL) return;

/* ===================== UPDATE ===================== */
function update() {

  if (player.x < 0) { player.x = 0; player.vx = 0; }

        if (p.kind === 'basket') { if (p.hit.indexOf(m) === -1) { p.hit.push(m); damageMonster(m, dmg, p.vx); spawnParticles(p.x, p.y, '#ffae3c', 10, 7); } }

  // монстры
  for (const m of level.monsters) {
    if (m.dead) continue;
    m.t++; if (m.hurt > 0) m.hurt--; if (m.cd > 0) m.cd--;
    const dir = (player.x + player.w / 2) < (m.x + m.w / 2) ? -1 : 1;
    const dist = Math.abs((player.x + player.w / 2) - (m.x + m.w / 2));
    const active = dist < 640 || m.move === 'boss';
    if (m.move === 'hop') { m.vy += GRAVITY; if (m.onGround && active && m.t % 46 === 0) { m.vy = -m.hop; m.vx = dir * m.speed; } m.x += m.vx; m.y += m.vy; m.onGround = false; if (m.y + m.h >= GROUND_Y) { m.y = GROUND_Y - m.h; m.vy = 0; m.vx *= 0.8; m.onGround = true; } }
    else if (m.move === 'crawl') { m.vy += GRAVITY; if (active) m.x += dir * m.speed; m.y += m.vy; if (m.y + m.h >= GROUND_Y) { m.y = GROUND_Y - m.h; m.vy = 0; m.onGround = true; } }
    else if (m.move === 'fly') { if (active) { m.x += dir * m.speed; m.baseY += ((player.y + 8) - m.baseY) * 0.04; } else m.baseY += ((GROUND_Y - 150) - m.baseY) * 0.02; m.y = m.baseY + Math.sin(m.t * 0.1) * 16; }

    if (propBlocks(e.x, e.y, e.r)) { spawnParticles(e.x, e.y, '#bbb', 5, 4); e.life = 0; continue; }   // удар гасится об препятствие
    if (aabb({ x: e.x - e.r, y: e.y - e.r, w: e.r * 2, h: e.r * 2 }, player)) { hurtPlayer(e.dmg, e.x); e.life = 0; }

  for (const h of pickups) { if (h.taken) continue; h.bob += 0.08; if (aabb(player, { x: h.x - 16, y: h.y - 16, w: 32, h: 32 })) { h.taken = true; player.hp = Math.min(player.maxHp, player.hp + 25); floatText(h.x, h.y - 10, '+25', '#7CFC9B'); sfx.pick(); } }
  // периодический спавн сердечек на карте (восстановление здоровья)

/* ===================== СОБЫТИЯ (поезд / валун / лавина / камнепад) ===================== */
function updateEvents() {
  if (!level.eventKind) return;
  if (level.sweeper) {
    const s = level.sweeper; s.x += s.vx; s.rot = (s.rot || 0) + s.vx * 0.03;
    if (aabb(player, s)) hurtPlayer(s.dmg, s.x + s.w / 2);
    if ((s.vx < 0 && s.x + s.w < -90) || (s.vx > 0 && s.x > level.len + 90)) { level.sweeper = null; level.eventCd = 360 + Math.random() * 220; }
    return;
  }
  if (level.rocks.length) {
    for (const rk of level.rocks) { if (rk.delay > 0) { rk.delay--; continue; } rk.y += rk.vy; rk.vy += GRAVITY * 0.5; rk.rot += 0.1; if (aabb({ x: rk.x - rk.r, y: rk.y - rk.r, w: rk.r * 2, h: rk.r * 2 }, player)) { hurtPlayer(rk.dmg, rk.x); rk.done = true; } if (rk.y - rk.r > GROUND_Y) { rk.done = true; spawnParticles(rk.x, GROUND_Y, '#9a8f80', 9, 6); } }
    level.rocks = level.rocks.filter(rk => !rk.done);
    if (!level.rocks.length) level.eventCd = 360 + Math.random() * 220;
    return;
  }
  if (level.eventWarn > 0) { level.eventWarn--; if (level.eventWarn === 0) spawnEvent(); }
  else { level.eventCd--; if (level.eventCd <= 0) { level.eventWarn = 100; alertT = 100; alertText = EVENT_ALERT[level.eventKind]; if (level.eventKind === 'rockfall') sfx.ult(); else sfx.horn(); } }
}
function spawnEvent() {
  const k = level.eventKind;
  if (k === 'train') level.sweeper = { kind: 'train', x: camera.x + W + 120, y: GROUND_Y - 78, w: 420, h: 78, vx: -18, dmg: 30 };
  else if (k === 'boulder') level.sweeper = { kind: 'boulder', x: camera.x + W + 80, y: GROUND_Y - 70, w: 70, h: 70, vx: -10.5, dmg: 16, rot: 0 };
  else if (k === 'avalanche') level.sweeper = { kind: 'avalanche', x: camera.x - 380, y: GROUND_Y - 200, w: 330, h: 200, vx: 11.5, dmg: 26 };
  else if (k === 'rockfall') { level.rocks = []; for (let i = 0; i < 6; i++) { const rx = camera.x + 60 + Math.random() * (W - 120); level.rocks.push({ x: rx, y: -30, vy: 3.5, r: 18, dmg: 16, rot: 0, delay: 26 + i * 10 }); } }
}

/* ===================== БОСС ===================== */
function updateBoss(m, dir, dist) {

  const frac = m.hp / m.maxHp; m.phase = frac > 0.6 ? 1 : frac > 0.3 ? 2 : 3;

    if (m.t % 2 === 0) spawnParticles(m.teleTarget + m.w / 2, m.y + m.h / 2, '#ff7bd6', 3, 7);
    if (m.teleAnim <= 0) { m.x = m.teleTarget; m.teleState = 'in'; m.teleAnim = 14; spawnParticles(m.x + m.w / 2, m.y + m.h / 2, '#ff7bd6', 28, 11); sfx.tele(); }

  const thr = [0.75, 0.5, 0.25];
  if (m.barrageT <= 0 && m.tier < 3 && frac <= thr[m.tier] && !m.ultState) {
    m.tier++; m.barrageT = 210 + m.tier * 35; m.shield = true; m.teleState = null;
    alertT = 130; alertText = '🌩 БОСС ВЗМЫВАЕТ ВВЕРХ! Беги и уворачивайся!'; camera.shake = 12; sfx.ult();
  }
  if (m.barrageT > 0) {
    m.barrageT--; m.shield = true;
    const tx = Math.max(40, Math.min(level.len - 40 - m.w, player.x + player.w / 2 - m.w / 2 + Math.sin(m.bob) * 60));
    m.x += (tx - m.x) * 0.05; m.y += ((58 + Math.sin(m.bob * 1.4) * 12) - m.y) * 0.08;
    const rate = Math.max(10, 16 - m.tier * 2);
    if (m.t % rate === 0) {
      const ox = camera.x + 30 + Math.random() * (W - 60), pick = Math.random();
      if (pick < 0.4) eprojectiles.push({ x: ox, y: -20, vx: 0, vy: 3.8 + m.tier * 0.3, r: 15, dmg: 8, life: 240, grav: 2, kind: 'pelmeni', rot: Math.random() * 6, vr: 0.14 });
      else if (pick < 0.7) eprojectiles.push({ x: ox, y: -20, vx: 0, vy: 4.2 + m.tier * 0.3, r: 14, dmg: 9, life: 240, grav: 2, kind: 'meteor' });
      else eprojectiles.push({ x: ox, y: -20, vx: 0, vy: 3.6 + m.tier * 0.3, r: 16, dmg: 9, life: 240, grav: 2, kind: 'rock', rot: 0, vr: 0.12 });
    }
    if (m.barrageT <= 0) { m.shield = false; alertT = 100; alertText = '⚔️ Бей босса! Лови аптечки'; for (let k = 0; k < 2; k++) pickups.push({ x: Math.max(60, Math.min(level.len - 60, player.x + player.w / 2 + (k ? 150 : -150))), y: GROUND_Y - 30, type: 'heart', bob: Math.random() * 6, taken: false }); sfx.pick(); }
    return;
  }
  m.shield = false;

  if (m.ultState === 'charge') {
    m.ultAnim--; camera.shake = Math.max(camera.shake, 4);
    const tx = camera.x + W / 2 - m.w / 2, ty = GROUND_Y - 270;
    m.x += (tx - m.x) * 0.09; m.y += (ty - m.y) * 0.09;
    if (m.t % 3 === 0) particles.push({ x: m.x + m.w / 2 + (Math.random() - 0.5) * m.w, y: m.y + m.h, vx: 0, vy: -2 - Math.random() * 2, life: 26, size: 6, kind: 'fire' });
    if (m.ultAnim <= 0) { m.ultState = 'cast'; m.ultAnim = 150; alertT = 110; alertText = '☄️ ПЕЛЬМЕННЫЙ ШТОРМ!'; sfx.ult(); }
    return;
  }
  if (m.ultState === 'cast') {
    m.ultAnim--;

      eprojectiles.push(pel ? { x: mx, y: -20, vx: (Math.random() - 0.5) * 1.2, vy: 4.5, r: 16, dmg: 13, life: 220, grav: 2, kind: 'pelmeni', rot: Math.random() * 6, vr: 0.14 }
                            : { x: mx, y: -20, vx: 0, vy: 5, r: 14, dmg: 14, life: 220, grav: 2, kind: 'meteor' }); }

}

function damageMonster(m, dmg, knockDir) {

  ctx.beginPath(); ctx.moveTo(W / 2, courtY + 12); ctx.lineTo(W / 2, H - 12); ctx.stroke();
  const nx = W / 2, ntop = courtY - 56;
  ctx.strokeStyle = '#cfd3d8'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(nx - 150, courtY + 14); ctx.lineTo(nx - 150, ntop); ctx.moveTo(nx + 150, courtY + 14); ctx.lineTo(nx + 150, ntop); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.beginPath(); for (let gx = nx - 150; gx <= nx + 150; gx += 12) { ctx.moveTo(gx, ntop + 8); ctx.lineTo(gx, courtY + 12); } for (let gy = ntop + 8; gy <= courtY + 12; gy += 12) { ctx.moveTo(nx - 150, gy); ctx.lineTo(nx + 150, gy); } ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.fillRect(nx - 150, ntop, 300, 8);
  // прыгающие мячи (декор)
  for (const bx of [80, W / 2, W - 80]) { const i = bx, by = courtY - 30 - Math.abs(Math.sin(T * 1.4 + bx)) * 70; ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(bx, courtY + 6, 12, 4, 0, 0, 7); ctx.fill(); ctx.save(); ctx.translate(bx, by); ctx.rotate(T * (bx > W / 2 ? 1 : -1)); drawBall(0, 0, 16); ctx.restore(); }

  // заголовок
  ctx.textAlign = 'center';
  const ty = 64 + Math.sin(T * 1.6) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.font = 'bold 44px -apple-system, Arial'; ctx.fillText('🏐 Волейбол-Квест', W / 2 + 2, ty + 3);
  ctx.fillStyle = '#11324f'; ctx.fillText('🏐 Волейбол-Квест', W / 2, ty);
  ctx.fillStyle = '#1c5a8f'; ctx.font = 'bold 17px -apple-system, Arial'; ctx.fillText('Выбери героя и пройди 6 локаций до босса!', W / 2, 100);
  ctx.fillStyle = 'rgba(20,60,90,0.7)'; ctx.font = '14px -apple-system, Arial'; ctx.fillText(touchMode ? 'Тапни по герою, чтобы начать' : '← →  выбор   ·   Space / Enter — начать   ·   клик по герою', W / 2, 124);
  // твой рекорд (сохраняется между заходами)
  ctx.font = 'bold 15px -apple-system, Arial'; const recTxt = '🏆 Твой рекорд: ' + best; const rw = ctx.measureText(recTxt).width + 30;
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; roundRectPath(W / 2 - rw / 2, 138, rw, 27, 13); ctx.fill();
  ctx.fillStyle = '#b8860b'; ctx.fillText(recTxt, W / 2, 156);

  // карточки героев
  const slots = selectSlots();
  for (let i = 0; i < slots.length; i++) {
    const s = slots[i], c = characters[i], sel = i === selIdx;
    const pad = 22, cardX = s.bx - pad, cardY = s.by - pad, cardW = s.size + pad * 2, cardH = s.size + pad * 2 + 44;
    const pop = sel ? 1 + Math.sin(T * 3) * 0.012 : 1;
    ctx.save(); ctx.translate(s.cx, cardY + cardH / 2); ctx.scale(pop, pop); ctx.translate(-s.cx, -(cardY + cardH / 2));
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; roundRectPath(cardX + 4, cardY + 8, cardW, cardH, 18); ctx.fill();
    const pg = ctx.createLinearGradient(0, cardY, 0, cardY + cardH); if (sel) { pg.addColorStop(0, '#ffffff'); pg.addColorStop(1, '#e6f0ff'); } else { pg.addColorStop(0, '#f4f6fa'); pg.addColorStop(1, '#dde3ec'); }
    ctx.fillStyle = pg; roundRectPath(cardX, cardY, cardW, cardH, 18); ctx.fill();
    ctx.lineWidth = sel ? 4 : 2; ctx.strokeStyle = sel ? '#1f7ae0' : 'rgba(0,0,0,0.12)'; roundRectPath(cardX, cardY, cardW, cardH, 18); ctx.stroke();
    if (sel) { ctx.save(); ctx.shadowColor = 'rgba(31,122,224,0.6)'; ctx.shadowBlur = 22; ctx.strokeStyle = 'rgba(31,122,224,0.9)'; ctx.lineWidth = 3; roundRectPath(cardX, cardY, cardW, cardH, 18); ctx.stroke(); ctx.restore(); }
    ctx.save(); roundRectPath(s.bx, s.by, s.size, s.size, 12); ctx.clip(); ctx.fillStyle = '#cfe3f5'; ctx.fillRect(s.bx, s.by, s.size, s.size); if (c.ready) ctx.drawImage(c.img, s.bx, s.by, s.size, s.size); else drawVectorPlayer(s.bx, s.by, s.size, s.size, i); ctx.restore();
    const pillW = 124, pillH = 30, px = s.cx - pillW / 2, py = s.by + s.size + 10;
    ctx.fillStyle = sel ? '#1f7ae0' : '#8a93a3'; roundRectPath(px, py, pillW, pillH, 15); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 17px -apple-system, Arial'; ctx.fillText(c.name, s.cx, py + 21);
    ctx.restore();
  }

  // кнопка ИГРАТЬ (пульсирует)
  const bw = 240, bh = 50, bx0 = W / 2 - bw / 2, by0 = H - 62;
  ctx.save(); ctx.globalAlpha = 0.6 + Math.abs(Math.sin(T * 2)) * 0.4; ctx.fillStyle = '#19b34a'; roundRectPath(bx0, by0, bw, bh, 25); ctx.fill(); ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2; roundRectPath(bx0, by0, bw, bh, 25); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px -apple-system, Arial'; ctx.fillText('▶  ИГРАТЬ', W / 2, by0 + 32);
  ctx.textAlign = 'left';
}
function drawEndScreen(win) {
  ctx.fillStyle = win ? 'rgba(20,40,20,0.82)' : 'rgba(20,10,16,0.82)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.fillStyle = win ? '#7CFC9B' : '#ff6b6b'; ctx.font = 'bold 46px -apple-system, Arial'; ctx.fillText(win ? '🏆 Победа!' : 'Игра окончена', W / 2, H / 2 - 40);
  ctx.fillStyle = '#fff'; ctx.font = '22px -apple-system, Arial'; ctx.fillText('Счёт: ' + Math.floor(score) + '   ·   Твой рекорд: ' + best, W / 2, H / 2 + 4);
  if (newRecord) { ctx.fillStyle = '#ffd23f'; ctx.font = 'bold 20px -apple-system, Arial'; ctx.fillText('🎉 Новый рекорд!', W / 2, H / 2 + 34); }
  else if (win) { ctx.fillStyle = '#cfe'; ctx.font = '16px -apple-system, Arial'; ctx.fillText('Все 6 локаций пройдены, босс повержен!', W / 2, H / 2 + 34); }
  ctx.fillStyle = '#cdd'; ctx.font = '16px -apple-system, Arial'; ctx.fillText(touchMode ? 'Тапни, чтобы выбрать героя заново' : 'Space / клик — выбрать героя заново', W / 2, H / 2 + 70); ctx.textAlign = 'left';
}

function roundRectPath(x, y, w, h, r) { r = Math.min(r, w / 2, h / 2); ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

/* ===================== ЦИКЛ ===================== */
function render() {
  ctx.clearRect(0, 0, W, H); ctx.save();
  if (camera.shake > 0.4) ctx.translate((Math.random() - 0.5) * camera.shake, (Math.random() - 0.5) * camera.shake);
  drawBackground(); drawGround(); drawInteriors(); drawDecor();
  for (const hz of level.hazards) drawCar(hz);
  drawEvents();
  if (level.biome.dark > 0) drawVignette(level.biome.dark);
  for (const h of pickups) if (!h.taken) { const yy = h.y + Math.sin(h.bob) * 4; drawHeart(h.x - camera.x, yy, 1.6, '#ff4d6d'); }
  if (level.portal) drawPortal(level.portal);
  for (const m of level.monsters) if (!m.dead) drawMonster(m);
  drawProjectiles(); drawPlayer(); drawParticles(); drawWeather();
  ctx.restore(); drawHUD(); drawTouchButtons();
}
function drawCar(hz) {
  const x = hz.x - camera.x, y = hz.y; if (x + hz.w < -30 || x > W + 60) return;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(x + hz.w / 2, GROUND_Y + 3, hz.w * 0.5, 5, 0, 0, 7); ctx.fill();
  if (hz.fast) { ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2; const off = frame % 14; for (let i = 0; i < 4; i++) { const ly = y + 16 + i * 8; ctx.beginPath(); ctx.moveTo(x + hz.w + 4 + off, ly); ctx.lineTo(x + hz.w + 24 + off, ly); ctx.stroke(); } ctx.font = '15px Arial'; ctx.fillStyle = '#fff'; ctx.fillText('🎵', x + hz.w + 6, y - 2); ctx.fillText('🎶', x - 14, y + 6); }
  const bg = ctx.createLinearGradient(x, y, x, y + hz.h); bg.addColorStop(0, hz.color); bg.addColorStop(1, 'rgba(0,0,0,0.35)'); ctx.fillStyle = bg; roundRectPath(x, y + 12, hz.w, hz.h - 12, 8); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; roundRectPath(x + hz.w * 0.2, y, hz.w * 0.5, 18, 6); ctx.fill(); ctx.fillStyle = '#bfe6ff'; roundRectPath(x + hz.w * 0.24, y + 3, hz.w * 0.42, 13, 4); ctx.fill();
  ctx.fillStyle = '#ffe08a'; ctx.beginPath(); ctx.arc(x + (hz.vx < 0 ? 5 : hz.w - 5), y + hz.h - 16, 4, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(x + hz.w * 0.25, y + hz.h, 9, 0, 7); ctx.arc(x + hz.w * 0.75, y + hz.h, 9, 0, 7); ctx.fill(); ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(x + hz.w * 0.25, y + hz.h, 4, 0, 7); ctx.arc(x + hz.w * 0.75, y + hz.h, 4, 0, 7); ctx.fill();
}
function loop() {
  if (state === 'select') drawSelect();
  else if (state === 'playing') { update(); render(); }
  else if (state === 'paused') { render(); drawPauseScreen(); }
  else if (state === 'over' || state === 'win') { render(); drawEndScreen(state === 'win'); }
  requestAnimationFrame(loop);
}
loop();
</script>
