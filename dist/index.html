<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волейбол-Раннер</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #f7f7f7;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 { color: #333; margin: 10px 0 4px; font-size: 22px; }
  p.hint { color: #777; margin: 0 0 12px; font-size: 14px; text-align:center; }
  #wrap { position: relative; }
  canvas {
    background: #fdfdfd;
    border: 2px solid #ddd;
    border-radius: 12px;
    display: block;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #444;
    text-align: center;
    pointer-events: none;
  }
  #overlay .big { font-size: 26px; font-weight: 700; }
  #overlay .small { font-size: 15px; margin-top: 6px; color:#666;}
  .hidden { display: none !important; }
</style>
</head>
<body>
  <h1>🏐 Волейбол-Раннер</h1>
  <p class="hint">Пробел / ↑ / тап сверху — прыжок &nbsp;•&nbsp; ↓ / удерживай тап снизу — присесть</p>
  <div id="wrap">
    <canvas id="game" width="800" height="340"></canvas>
    <div id="overlay" class="hidden">
      <div class="big">Нажми, чтобы начать</div>
      <div class="small">Прыгай через мячи на земле, приседай под летящими!</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 40;

// ---- Персонажи (фото) ----
const characters = [
  { name: 'Лена', srcs: ['assets/player.png', 'assets/player.jpg', 'assets/player.jpeg'],
    img: new Image(), ready: false, idx: 0, sweater: '#2e2e30' },
  { name: 'Эрн', srcs: ['assets/player2.png', 'assets/player2.jpg', 'assets/player2.jpeg'],
    img: new Image(), ready: false, idx: 0, sweater: '#7a2e3a' },
];
characters.forEach(c => {
  c.img.onload = () => { c.ready = true; };
  c.img.onerror = () => { c.idx++; if (c.idx < c.srcs.length) c.img.src = c.srcs[c.idx]; };
  c.img.src = c.srcs[0];
});
let selIdx = 0;

// ---- Игрок ----
const STAND = 100;  // размер силуэта стоя
const DUCK = 56;    // размер силуэта в приседе
const player = {
  cx: 110,          // центр по X
  y: GROUND_Y,      // позиция ступней
  size: STAND,
  vy: 0,
  jumping: false,
  ducking: false,
};

const GRAVITY = 0.72;
const JUMP_V = -13.5;

let obstacles = [];
let speed = 6;
let score = 0;
let best = 0;
let frame = 0;
let state = 'select'; // select | playing | over

function reset() {
  player.y = GROUND_Y;
  player.vy = 0;
  player.jumping = false;
  player.ducking = false;
  player.size = STAND;
  obstacles = [];
  speed = 6;
  score = 0;
  frame = 0;
}

function startGame() {
  reset();
  state = 'playing';
  overlay.classList.add('hidden');
}

function goToSelect() {
  state = 'select';
  overlay.classList.add('hidden');
}

// общий «подтверждающий» жест: пробел / тап / клик
function press() {
  if (state === 'select') { startGame(); return; }
  if (state === 'over') { goToSelect(); return; }
  // playing — прыжок
  if (!player.jumping && !player.ducking) {
    player.vy = JUMP_V;
    player.jumping = true;
  }
}

function setDuck(on) {
  if (state !== 'playing') return;
  // присесть можно только стоя на земле
  player.ducking = on && !player.jumping;
}

function changeSel(d) {
  selIdx = (selIdx + characters.length + d) % characters.length;
}

const GROUND_KINDS = ['ball', 'pelmeni', 'bottle', 'frog'];

function spawnObstacle() {
  // 30% — летящий мяч (нужно присесть), иначе наземное препятствие (нужно прыгнуть)
  const overhead = Math.random() < 0.3;
  if (overhead) {
    const s = 36;
    obstacles.push({
      type: 'air', kind: 'ball',
      x: W + 10,
      y: GROUND_Y - 122,   // летит на уровне головы
      w: s, h: s, s,
      rot: 0,
    });
    return;
  }
  const kind = GROUND_KINDS[Math.floor(Math.random() * GROUND_KINDS.length)];
  let w, h;
  if (kind === 'ball')         { const s = 30 + Math.random() * 16; w = h = s; }
  else if (kind === 'pelmeni') { w = 48; h = 32; }
  else if (kind === 'bottle')  { w = 26; h = 56; }
  else /* frog */              { w = 46; h = 34; }
  obstacles.push({
    type: 'ground', kind,
    x: W + 10,
    y: GROUND_Y - h,
    w, h, s: Math.min(w, h),
    rot: 0,
  });
}

// ---- Отрисовка волейбольного мяча ----
function drawBall(cx, cy, r) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1f4fc4';
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.quadraticCurveTo(r, -r * 0.3, r * 0.4, r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(r * 0.3, 0, 0, -r); ctx.fill();
  ctx.fillStyle = '#f4c020';
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.quadraticCurveTo(-r, -r * 0.3, -r * 0.4, r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(-r * 0.3, 0, 0, -r); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

// ---- Отрисовка препятствий ----
function drawObstacle(o) {
  if (o.kind === 'ball') {
    ctx.save();
    ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
    ctx.rotate(o.rot);
    drawBall(0, 0, o.w / 2);
    ctx.restore();
  } else if (o.kind === 'pelmeni') {
    drawPelmeni(o.x, o.y, o.w, o.h);
  } else if (o.kind === 'bottle') {
    drawBottle(o.x, o.y, o.w, o.h);
  } else if (o.kind === 'frog') {
    drawFrog(o.x, o.y, o.w, o.h);
  }
}

function drawPelmeni(x, y, w, h) {
  const cx = x + w / 2, cy = y + h / 2;
  ctx.save();
  ctx.fillStyle = '#f3e7cd';
  ctx.strokeStyle = '#c9a86d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w / 2 - 1, h / 2 - 1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // защипы по верхнему краю
  ctx.fillStyle = '#e0caa0';
  const n = 7;
  for (let i = 0; i < n; i++) {
    const a = Math.PI + (i + 0.5) / n * Math.PI;
    const ex = cx + Math.cos(a) * (w / 2 - 3);
    const ey = cy + Math.sin(a) * (h / 2 - 3);
    ctx.beginPath(); ctx.arc(ex, ey, 2.2, 0, Math.PI * 2); ctx.fill();
  }
  // блик
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(cx - w * 0.14, cy - h * 0.16, w * 0.12, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBottle(x, y, w, h) {
  const capW = w * 0.5, capH = h * 0.1;
  ctx.save();
  // тело с водой
  ctx.fillStyle = '#9ed4ee';
  roundRectPath(x, y + h * 0.16, w, h * 0.84, 6); ctx.fill();
  ctx.strokeStyle = '#5fa8c9'; ctx.lineWidth = 1.5; ctx.stroke();
  // горлышко
  ctx.fillStyle = '#9ed4ee';
  roundRectPath(x + (w - capW) / 2, y + capH, capW, h * 0.12, 2); ctx.fill();
  // крышка
  ctx.fillStyle = '#2b6cb0';
  roundRectPath(x + (w - capW) / 2, y, capW, capH + 3, 2); ctx.fill();
  // этикетка
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(x, y + h * 0.46, w, h * 0.22);
  ctx.fillStyle = '#5fa8c9';
  ctx.fillRect(x, y + h * 0.5, w, 3);
  ctx.restore();
}

function drawFrog(x, y, w, h) {
  const cx = x + w / 2, cy = y + h * 0.6;
  ctx.save();
  ctx.fillStyle = '#5aa83e';
  ctx.strokeStyle = '#3d7a29';
  ctx.lineWidth = 2;
  // задние лапки
  ctx.beginPath(); ctx.ellipse(x + w * 0.16, y + h * 0.9, w * 0.14, h * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w * 0.84, y + h * 0.9, w * 0.14, h * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  // тело
  ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.42, h * 0.36, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // глаза
  const ey = y + h * 0.2, er = w * 0.13;
  for (const ex of [cx - w * 0.18, cx + w * 0.18]) {
    ctx.fillStyle = '#6fbf4f'; ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#3d7a29'; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, ey, er * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex, ey + 1, er * 0.3, 0, Math.PI * 2); ctx.fill();
  }
  // рот
  ctx.strokeStyle = '#2f5e1f'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, w * 0.22, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.restore();
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---- Игрок ----
function playerBox() {
  const s = player.size;
  return { x: player.cx - s / 2, y: player.y - s, w: s, h: s };
}

function drawPlayer() {
  const b = playerBox();
  // тень
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(player.cx, GROUND_Y + 4, b.w * 0.45, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const c = characters[selIdx];
  if (c.ready) {
    // фото с прозрачным фоном — вписываем квадрат в квадрат без рамки
    ctx.drawImage(c.img, b.x, b.y, b.w, b.h);
  } else {
    drawVectorPlayer(b, selIdx);
  }
}

// запасной персонаж, если фото не загрузилось
function drawVectorPlayer(b, idx) {
  const x = b.x, top = b.y;
  ctx.save();
  ctx.fillStyle = (characters[idx] && characters[idx].sweater) || '#2e2e30';
  roundRectPath(x + b.w * 0.2, top + b.h * 0.3, b.w * 0.6, b.h * 0.6, 6);
  ctx.fill();
  ctx.fillStyle = '#f0d4b6';
  ctx.beginPath();
  ctx.arc(x + b.w * 0.5, top + b.h * 0.22, b.w * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#cbb487';
  ctx.beginPath();
  ctx.arc(x + b.w * 0.5, top + b.h * 0.18, b.w * 0.24, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawGround() {
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  ctx.fillStyle = '#ddd';
  const off = (frame * speed) % 40;
  for (let i = -1; i < W / 40 + 1; i++) ctx.fillRect(i * 40 - off, GROUND_Y + 8, 18, 3);
}

function overlap(a, o) {
  const pad = 6;
  return a.x + pad < o.x + o.w &&
         a.x + a.w - pad > o.x &&
         a.y + pad < o.y + o.h &&
         a.y + a.h - pad > o.y;
}

function update() {
  frame++;

  // приседание меняет размер силуэта (ступни на земле)
  player.size = player.ducking ? DUCK : STAND;

  // физика
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.jumping = false;
  }

  // спавн
  const interval = Math.max(58, 100 - speed * 3);
  if (frame % Math.round(interval) === 0 && Math.random() > 0.2) spawnObstacle();

  for (const o of obstacles) { o.x -= speed; o.rot -= speed / o.s; }
  obstacles = obstacles.filter(o => o.x + o.w > -10);

  const b = playerBox();
  for (const o of obstacles) {
    if (overlap(b, o)) {
      state = 'over';
      best = Math.max(best, Math.floor(score));
      overlay.querySelector('.big').textContent = 'Игра окончена!';
      overlay.querySelector('.small').textContent =
        'Счёт: ' + Math.floor(score) + ' · Рекорд: ' + best + ' — нажми, чтобы выбрать героя';
      overlay.classList.remove('hidden');
    }
  }

  score += 0.15;
  speed += 0.0016;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGround();
  for (const o of obstacles) drawObstacle(o);
  drawPlayer();
  ctx.fillStyle = '#444';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('HI ' + String(best).padStart(5, '0') +
               '   ' + String(Math.floor(score)).padStart(5, '0'), W - 14, 26);
  ctx.textAlign = 'left';
}

// ---- Экран выбора персонажа ----
function selectSlots() {
  const size = 130;
  const cxs = [W * 0.33, W * 0.67];
  return cxs.map(cx => ({ cx, size, bx: cx - size / 2, by: GROUND_Y - size }));
}

function drawSelect() {
  ctx.clearRect(0, 0, W, H);
  drawGround();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#333';
  ctx.font = 'bold 24px -apple-system, Arial';
  ctx.fillText('Выбери персонажа', W / 2, 48);
  ctx.fillStyle = '#999';
  ctx.font = '14px -apple-system, Arial';
  ctx.fillText('← →  или клик по герою   •   Пробел / тап — играть', W / 2, 74);

  const slots = selectSlots();
  for (let i = 0; i < slots.length; i++) {
    const s = slots[i], c = characters[i];
    if (i === selIdx) {
      ctx.fillStyle = 'rgba(31,79,196,0.10)';
      roundRectPath(s.bx - 16, s.by - 16, s.size + 32, s.size + 46, 14); ctx.fill();
      ctx.strokeStyle = '#1f4fc4'; ctx.lineWidth = 3;
      roundRectPath(s.bx - 16, s.by - 16, s.size + 32, s.size + 46, 14); ctx.stroke();
    }
    if (c.ready) ctx.drawImage(c.img, s.bx, s.by, s.size, s.size);
    else drawVectorPlayer({ x: s.bx, y: s.by, w: s.size, h: s.size }, i);
    ctx.fillStyle = i === selIdx ? '#1f4fc4' : '#666';
    ctx.font = 'bold 15px -apple-system, Arial';
    ctx.fillText(c.name, s.cx, GROUND_Y + 26);
  }
  ctx.textAlign = 'left';
}

function loop() {
  if (state === 'select') {
    drawSelect();
  } else {
    if (state === 'playing') update();
    draw();
  }
  requestAnimationFrame(loop);
}

// ---- Управление ----
window.addEventListener('keydown', e => {
  if (state === 'select') {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); changeSel(-1); return; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); changeSel(1); return; }
  }
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') {
    e.preventDefault(); press();
  } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
    e.preventDefault(); setDuck(true);
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') setDuck(false);
});

// перевод координат клика/тача в систему холста
function canvasXY(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height),
  };
}

function onDown(clientX, clientY) {
  if (state === 'select') {
    const p = canvasXY(clientX, clientY);
    const slots = selectSlots();
    for (let i = 0; i < slots.length; i++) {
      const s = slots[i];
      if (p.x > s.bx - 16 && p.x < s.bx + s.size + 16) { selIdx = i; break; }
    }
    startGame();
    return;
  }
  if (state === 'over') { goToSelect(); return; }
  // playing: верхняя половина — прыжок, нижняя — присесть (удержание)
  const rect = canvas.getBoundingClientRect();
  if ((clientY - rect.top) > rect.height * 0.55) setDuck(true); else press();
}
canvas.addEventListener('mousedown', e => { e.preventDefault(); onDown(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => setDuck(false));
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); setDuck(false); }, { passive: false });

loop();
</script>
</body>
</html>
